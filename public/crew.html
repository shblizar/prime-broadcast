<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { initializeFirestore, doc, setDoc, deleteDoc, collection, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Universal App State
    let firebaseConfig = null;
    let isConfigured = false;
    let firestoreDB = null;
    let localVouchers = [
      { code: 'DISKON10', discount: 10, packageId: 'all' },
      { code: 'PROMO20', discount: 20, packageId: 'all' },
      { code: 'PRIMEKREATOR', discount: 15, packageId: 'all' }
    ];

    const LS_KEY = 'pb_vouchers_database_v2';

    // Check Local Storage Values
    function getStoredLocalVouchers() {
      const stored = localStorage.getItem(LS_KEY);
      if (stored) {
        try { 
          const list = JSON.parse(stored);
          return list.map(item => ({
            code: item.code,
            discount: item.discount,
            packageId: item.packageId || 'all'
          }));
        } catch(e) {}
      }
      localStorage.setItem(LS_KEY, JSON.stringify(localVouchers));
      return localVouchers;
    }

    function saveStoredLocalVouchers(arr) {
      localStorage.setItem(LS_KEY, JSON.stringify(arr));
    }

    // High quality timeout helper so we don't hang if user's firestore is unprovisioned or network is blocked
    function withTimeout(promise, ms, errorMsg) {
      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error(errorMsg)), ms);
        promise.then(
          (val) => { clearTimeout(timer); resolve(val); },
          (err) => { clearTimeout(timer); reject(err); }
        );
      });
    }

    // 1. LOAD CONFIGURATION FIRST
    async function loadConfig() {
      try {
        const res = await fetch('/firebase-config.json');
        if (res.ok) {
          firebaseConfig = await res.json();
          isConfigured = !!(firebaseConfig.apiKey && firebaseConfig.projectId);
          
          if (isConfigured) {
            // Initialize Modular SDK
            const app = initializeApp({
              apiKey: firebaseConfig.apiKey,
              authDomain: firebaseConfig.authDomain,
              projectId: firebaseConfig.projectId,
              storageBucket: firebaseConfig.storageBucket,
              messagingSenderId: firebaseConfig.messagingSenderId,
              appId: firebaseConfig.appId
            });
            firestoreDB = initializeFirestore(app, {
              databaseId: "ai-studio-9fa16efd-ca61-4b30-8eaf-5b4177bbc8e0e"
            });
          }
        }
      } catch (err) {
        console.error("Gagal memuat konfigurasi Firebase, fallback ke LocalStorage", err);
      }
      
      // Auto checking session login on load
      checkSession();
    }

    // 2. CHECK SESSION LOGIN
    function checkSession() {
      const parent = document.getElementById('adminContent');
      const cover = document.getElementById('loginOverlay');
      
      if (sessionStorage.getItem('pb_admin_auth') === 'true') {
        cover.style.opacity = '0';
        setTimeout(() => {
          cover.classList.add('hidden');
          parent.classList.remove('hidden');
          // Load active data
          loadDataAndRender();
        }, 300);
      } else {
        cover.classList.remove('hidden');
        parent.classList.add('hidden');
      }
    }

    // 3. LOGIN SUBMIT
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const inputPass = document.getElementById('adminPasswordInput').value;
      const correctPass = (firebaseConfig && firebaseConfig.adminPassword) || 'admin';
      const errMsg = document.getElementById('loginError');

      if (inputPass === correctPass) {
        errMsg.classList.add('hidden');
        sessionStorage.setItem('pb_admin_auth', 'true');
        checkSession();
      } else {
        errMsg.classList.remove('hidden');
        // Shake feedback
        document.getElementById('adminPasswordInput').classList.add('border-red-500');
        setTimeout(() => document.getElementById('adminPasswordInput').classList.remove('border-red-500'), 500);
      }
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', function() {
      sessionStorage.removeItem('pb_admin_auth');
      location.reload();
    });

    // 4. FETCH DATA AND RENDER COMPONENT
    async function loadDataAndRender() {
      const badge = document.getElementById('dbStatusBadge');
      const tableSub = document.getElementById('tableSub');
      const targetMetric = document.getElementById('metricTarget');
      
      let vouchersList = [];

      if (isConfigured && firestoreDB) {
        badge.innerHTML = `
          <span class="text-xs bg-green-500/10 text-green-400 border border-green-500/20 px-3 py-1.5 rounded-xl flex items-center gap-1.5 font-sans font-bold">
            <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
            Cloud Connected (Firestore)
          </span>
        `;
        targetMetric.innerText = `Firestore: ${firebaseConfig.projectId}.firebaseapp.com`;
        tableSub.innerText = 'Tersinkronisasi otomatis dengan Cloud Firestore';
        
        try {
          const vouchersCol = collection(firestoreDB, 'vouchers');
          const snapshot = await withTimeout(
            getDocs(vouchersCol),
            5000,
            "Timeout memuat data dari Firestore! Database mungkin belum dibuat di console.firebase.google.com atau aturan keamanan memblokirnya."
          );
          
          snapshot.forEach(docSnapshot => {
            const data = docSnapshot.data();
            vouchersList.push({
              code: docSnapshot.id.toUpperCase(),
              discount: Number(data.discount || 0),
              packageId: data.packageId || 'all'
            });
          });
        } catch (e) {
          console.error("Firestore get failed, falling back to LocalStorage on-the-fly", e);
          vouchersList = getStoredLocalVouchers();
          tableSub.innerHTML = `<span class="text-red-400 font-bold">Gagal sinkron cloud (Offline fallback): ${e.message}</span>`;
        }
      } else {
        badge.innerHTML = `
          <span class="text-xs bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1.5 rounded-xl flex items-center gap-1.5 font-sans font-bold">
            <span class="w-1.5 h-1.5 rounded-full bg-amber-400"></span>
            Demo Mode (LocalStorage)
          </span>
        `;
        targetMetric.innerText = 'Penyimpanan Lokal Browser (LocalStorage)';
        tableSub.innerText = 'Hubungkan Firebase Anda di "/public/firebase-config.json"';
        vouchersList = getStoredLocalVouchers();
      }

      renderTable(vouchersList);
      updateMetrics(vouchersList);
    }

    // Render HTML Table
    function renderTable(list) {
      const tbody = document.getElementById('vouchersTableBody');
      if (list.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="4" class="py-8 text-center text-slate-500 text-xs font-sans">
              Belum ada voucher terdaftar di database ini. Ketik di panel kiri untuk menyimpan!
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = list.map((v) => {
        let pkgLabel = 'Semua Paket';
        let badgeColor = 'bg-blue-500/10 text-blue-400 border-blue-500/20';
        const pkgId = v.packageId || 'all';
        
        if (pkgId === 'lite') {
          pkgLabel = 'Lite Package';
          badgeColor = 'bg-amber-500/10 text-amber-400 border-amber-500/20';
        } else if (pkgId === 'regular') {
          pkgLabel = 'Regular Package';
          badgeColor = 'bg-indigo-500/10 text-indigo-400 border-indigo-500/20';
        } else if (pkgId === 'gold') {
          pkgLabel = 'Gold Package';
          badgeColor = 'bg-yellow-500/10 text-yellow-500 border-yellow-500/20';
        } else if (pkgId === 'platinum') {
          pkgLabel = 'Platinum Package';
          badgeColor = 'bg-purple-500/10 text-purple-400 border-purple-500/20';
        }

        return `
        <tr class="hover:bg-white/[0.02] transition-colors border-b border-white/5">
          <td class="py-3 px-3 text-white font-bold select-all flex items-center gap-1.5">
            <span class="inline-block w-1.5 h-1.5 rounded-full bg-blue-500"></span>
            ${v.code}
          </td>
          <td class="py-3 px-3 text-right font-bold text-teal-400 font-mono-code">
            ${v.discount}% Off
          </td>
          <td class="py-3 px-3 text-center">
            <span class="text-[10px] uppercase font-bold tracking-tight px-2 py-0.5 rounded-full border ${badgeColor}">
              ${pkgLabel}
            </span>
          </td>
          <td class="py-3 px-3 text-center">
            <button 
              onclick="deleteVoucherFromServer('${v.code}')"
              class="bg-red-500/10 hover:bg-red-500/25 border border-red-500/20 text-red-400 hover:text-white rounded-lg px-2.5 py-1 text-[11px] font-bold font-sans transition-colors cursor-pointer"
            >
              Hapus
            </button>
          </td>
        </tr>
        `;
      }).join('');
    }

    // Update Analytics state
    function updateMetrics(list) {
      document.getElementById('metricTotal').innerText = list.length + ' Kupon';
      
      if (list.length === 0) {
        document.getElementById('metricAverage').innerText = '0%';
        return;
      }
      
      const sum = list.reduce((acc, curr) => acc + curr.discount, 0);
      const avg = Math.round(sum / list.length);
      document.getElementById('metricAverage').innerText = avg + '%';
    }

    // 5. ADD A NEW VOUCHER IN REAL TIME
    document.getElementById('voucherForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const codeInput = document.getElementById('code');
      const discountInput = document.getElementById('discount');
      const packageSelect = document.getElementById('packageId');
      const submitBtn = document.getElementById('submitBtn');

      const codeVal = codeInput.value.trim().toUpperCase();
      const discountVal = parseInt(discountInput.value);
      const packageIdVal = packageSelect.value || 'all';

      if (!codeVal) return;
      if (isNaN(discountVal) || discountVal < 1 || discountVal > 100) {
        alert('Diskon wajib bernilai angka antara 1 s/d 100%');
        return;
      }

      submitBtn.innerText = 'Menyimpan...';
      submitBtn.disabled = true;

      try {
        if (isConfigured && firestoreDB) {
          // Cloud save to Firestore using setDoc with modular direct call
          const voucherDocRef = doc(firestoreDB, 'vouchers', codeVal);
          
          await withTimeout(
            setDoc(voucherDocRef, {
              discount: discountVal,
              packageId: packageIdVal,
              updatedAt: serverTimestamp()
            }),
            6000,
            "Firestore tidak merespons dalam 6 detik. Masalah ini biasa terjadi jika Anda belum masuk ke Firebase Console dan belum membuat database Firestore (atau Rules di tab Rules masih diset 'locked' / default deny)."
          );
          
          console.log("Firestore write success for:", codeVal);
        } else {
          // Local storage save
          let list = getStoredLocalVouchers();
          const matchIdx = list.findIndex(v => v.code === codeVal);
          if (matchIdx >= 0) {
            list[matchIdx].discount = discountVal;
            list[matchIdx].packageId = packageIdVal;
          } else {
            list.push({ code: codeVal, discount: discountVal, packageId: packageIdVal });
          }
          saveStoredLocalVouchers(list);
          console.log("Localstorage write success for:", codeVal);
        }

        // Fresh retrieve
        await loadDataAndRender();
        codeInput.value = '';
        discountInput.value = '';
        packageSelect.value = 'all';
        codeInput.focus();
        
        alert(`Sukses! Voucher "${codeVal}" berhasil disimpan dan langsung aktif.`);
      } catch (err) {
        console.error("GAGAL MENYIMPAN VOUCHER KE CLOUD:", err);
        
        let errorHint = "\n\nSaran Troubleshooting:\n";
        if (err.message && (err.message.includes("permission-denied") || err.message.includes("permissions"))) {
          errorHint += "1. PERMISSIONS ERROR: Firestore Security Rules Anda menolak penulisan data. Konfigurasikan allow write pada path vouchers agar dapat diakses.\n2. Anda juga dapat menyalin konten 'firestore.rules' dari root proyek Anda.";
        } else if (err.message && err.message.includes("Firestore tidak merespons")) {
          errorHint += "1. DATABASE TIDAK ADA: BKB atau buat database baru terlebih dahulu. Buka console.firebase.google.com, pastikan di bagian 'Firestore Database' Anda sudah memilih 'Create Database'.\n2. Jika database belum dibuat sama sekali di konsol Firebase, SDK akan gantung tanpa melempar error langsung.";
        } else {
          errorHint += "Harap verifikasi bahwa data di '/public/firebase-config.json' sudah diisi dengan API Key dan Project ID Anda yang valid.";
        }
        
        alert("GAGAL MENYIMPAN VOUCHER KE CLOUD!\n\nDetail Error: " + err.message + errorHint);
      } finally {
        submitBtn.innerText = 'Simpan ke Database Live';
        submitBtn.disabled = false;
      }
    });

    // 6. DELETE A SPECIFIC VOUCHER IN REAL TIME
    async function deleteVoucherFromServer(code) {
      if (!confirm(`Konfirmasi: Ingin menghapus voucher ${code} dari database secara permanen?`)) return;

      try {
        if (isConfigured && firestoreDB) {
          const voucherDocRef = doc(firestoreDB, 'vouchers', code);
          await withTimeout(
            deleteDoc(voucherDocRef),
            5000,
            "Firestore tidak membalas dalam 5 detik. Periksa koneksi cloud Anda."
          );
        } else {
          let list = getStoredLocalVouchers();
          list = list.filter(v => v.code !== code);
          saveStoredLocalVouchers(list);
        }
        await loadDataAndRender();
        alert(`Voucher "${code}" berhasil dihapus.`);
      } catch (err) {
        console.error("Gagal menghapus dari cloud:", err);
        alert("Gagal menghapus voucher: " + err.message);
      }
    }
    
    // Assign global handler
    window.deleteVoucherFromServer = deleteVoucherFromServer;

    // Bootstrap Entry
    window.addEventListener('DOMContentLoaded', loadConfig);
  </script>
